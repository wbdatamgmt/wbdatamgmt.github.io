<!DOCTYPE html>
<html lang="{{ $.Site.LanguageCode | default "en" }}">
  <head>
    <title>{{ block "title" . }}{{ with .Params.Title }}{{ . }} | {{ end }}{{ .Site.Title }}{{ end }}</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{if .IsPage}}{{ .Summary }}{{ else }}{{ with .Site.Params.description }}{{ . }}{{ end }}{{ end }}{{ end }}">
    {{ hugo.Generator }}
    <link rel="stylesheet" href="{{ "/css/course.css" | relURL }}">
    <link rel="shortcut icon" href="{{ "/favicon.ico" | relURL }}" type="image/x-icon" />
    {{ if or .Params.math .Site.Params.math }}
      {{ partial "math.html" . }}
    {{ end }}

    <meta property="og:title" content="Basics of Data Management">
    <meta property="og:site_name" content="Basics of Data Management">
    <meta property="og:url" content="https://wbdatamgmt.github.io/">
    <meta property="og:description" content="A free, self-paced video course covering Excel, data visualisation, Google Forms, and Google Sheets.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://wbdatamgmt.github.io/Basics-of-Data-Management.jpg">

    <script data-goatcounter="https://wbdatamgmt.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  </head>

  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    {{ partial "navigation.html" . }}

    <main class="main" id="main-content">
      {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}
  </body>
</html>
